steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/roadside-assist:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/roadside-assist:latest'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/roadside-assist:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/roadside-assist:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'roadside-assist'
      - '--image'
      - 'gcr.io/$PROJECT_ID/roadside-assist:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '5000'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

images:
  - 'gcr.io/$PROJECT_ID/roadside-assist:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/roadside-assist:latest'

options:
  logging: CLOUD_LOGGING_ONLY
